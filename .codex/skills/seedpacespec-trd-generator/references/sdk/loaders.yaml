# =============================================================================
# SDK / 库 / 工具包 技术栈 —— 条件加载表
# -----------------------------------------------------------------------------
# 本文件由 SKILL.md 在 Step 8「条件加载评估」中读取。
# AI 必须:
#   1. 始终读取 mandatory 列表里的所有文件
#   2. 对 conditions 中的每条逐项判定;命中的把对应 file 读进上下文
#   3. 输出"条件评估表"
# =============================================================================

mandatory:
  - file: ../../examples/high-quality-trd.md
    label: 黄金样本(质量锚点)
    reason: 对标写作深度和结构，术语替换为 SDK 概念（Client/Builder/Transport/Codec/Options）

# ---------- Full 级别展开维度(Q-depth 评估表中供用户勾选) ----------
depth_dimensions:
  - id: public_api
    label: 公开 API 设计
    applicable_when: 新增或变更对外暴露的接口
  - id: internal_module
    label: 内部模块架构设计
    applicable_when: 新增或重构 SDK 内部复杂逻辑模块（如网络层、调度器、状态机、缓存引擎等）
  - id: lifecycle
    label: 初始化/销毁生命周期
    applicable_when: SDK 实例有创建、配置、销毁流程
  - id: error_handling
    label: 错误码与异常体系
    applicable_when: 新增错误类型或异常处理策略
  - id: versioning
    label: 版本兼容策略
    applicable_when: 涉及 breaking change 或多版本共存
  - id: dependency
    label: 依赖与包体积约束
    applicable_when: 引入新依赖或有体积要求
  - id: extension
    label: 扩展点/插件机制
    applicable_when: 支持用户自定义行为或插件

conditions:

  - id: S1
    label: 涉及公开 API 变更？
    file: sdk-api-design-guide.md
    section: 全文
    quick_check: |
      改动方案中是否有新增/修改/废弃对外暴露的类、函数、方法？
      有 → 命中。纯内部重构 → 不命中。
    purpose: 提供 API 设计原则、内部模块架构设计、命名约定、参数设计、版本兼容策略的写法标杆

  - id: S2
    label: 涉及生命周期或资源管理？
    file: sdk-lifecycle-guide.md
    section: 全文
    quick_check: |
      改动方案中是否涉及 SDK 实例创建/初始化/配置/销毁/资源释放？
      有 → 命中。
    purpose: 提供 Builder 模式、Options 模式、资源清理策略的参考

# ---------- 兜底说明 ----------
fallback_note: |
  全未命中 = 简单内部变更，只需黄金样本对齐质量。但仍需确保公开 API 不被意外破坏。
