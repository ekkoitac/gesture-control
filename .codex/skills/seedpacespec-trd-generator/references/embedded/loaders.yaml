# ---------- Full 级别展开维度(Q-depth 评估表中供用户勾选) ----------
depth_dimensions:
  - id: hardware_interface
    label: 硬件接口与外设驱动
    applicable_when: 新增/修改 HAL/BSP/驱动层代码
  - id: interrupt_realtime
    label: 中断与实时性
    applicable_when: ISR、DMA、实时调度、时序约束
  - id: memory_budget
    label: 内存预算与分配
    applicable_when: Stack/Heap/Static 占用分析、内存池设计
  - id: task_scheduling
    label: 任务调度与同步
    applicable_when: RTOS 任务划分、信号量/互斥锁、优先级反转
  - id: power_management
    label: 功耗管理
    applicable_when: 低功耗模式、唤醒策略、休眠状态机
  - id: protocol_comm
    label: 通信协议
    applicable_when: UART/SPI/I2C/CAN/BLE/WiFi 协议栈交互
  - id: bootloader_ota
    label: Bootloader 与 OTA
    applicable_when: 固件升级流程、分区策略、回滚机制

mandatory:
  # 当前使用通用黄金样本。嵌入式团队准备好专属样本后，改为:
  #   file: ../../examples/embedded-high-quality-trd.md
  - file: ../../examples/high-quality-trd.md
    label: 黄金样本(质量锚点)
    reason: 即使技术栈差异大,设计意图深度与伪代码+白话的写作要求一致。当前为通用样本(偏前端),对标时只学写作深度,用嵌入式原生术语和思考维度填充

