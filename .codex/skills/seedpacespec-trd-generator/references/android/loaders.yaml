mandatory:
  - file: ../../examples/high-quality-trd.md
    label: 黄金样本（质量锚点）
    reason: 对标写作深度和结构，术语须替换为 Android 概念（ViewModel/Repository/UseCase/Activity/Fragment 等）

# 展开维度菜单（供 Q-depth 评估时展示）
depth_dimensions:
  - 页面/屏幕结构（Activity/Fragment/Composable 层级）
  - UI 组件设计（Compose 组件树 / XML Layout）
  - 状态管理归属（ViewModel/StateFlow/LiveData/UiState）
  - 导航流与路由设计（Navigation Component/DeepLink）
  - 领域层（UseCase/Interactor）
  - 数据层（Repository/DataSource/DAO/Retrofit）
  - 依赖注入（Hilt/Dagger/Koin）
  - 生命周期管理（Lifecycle-aware components）
  - 需求实现链路

